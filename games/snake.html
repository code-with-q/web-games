<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Snake — Retro Mobile Edition</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: #1a1c23;
    color: #e6edf3;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    overscroll-behavior: none;
    touch-action: manipulation;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 15px;
  }
  h1 { 
    margin: 0 0 10px; 
    letter-spacing: 1px; 
    font-size: 1.5rem;
    text-align: center;
  }
  
  .game-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 600px;
  }

  .top-section {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    justify-content: center;
    width: 100%;
    margin-bottom: 20px;
  }

  canvas {
    background: #111a2e;
    border: 3px solid #2a3a5c;
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,.4);
    width: 100%;
    max-width: 400px;
    aspect-ratio: 1 / 1;
    touch-action: none;
  }

  /* --- Panel & Collapsible Settings --- */
  .panel {
    background: #232733;
    border: 1px solid #2a3a5c;
    border-radius: 8px;
    padding: 15px;
    min-width: 220px;
    flex-shrink: 0;
  }
  
  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  
  .panel-header .score {
    font-size: 18px;
    margin: 0;
    color: #7ee787;
    font-weight: bold;
  }
  
  .toggle-btn {
    background: #3a3f4b;
    color: #e6edf3;
    border: 1px solid #4a5060;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .toggle-btn:hover { background: #4a5060; }
  .toggle-btn:active { transform: scale(0.95); }

  .status {
    margin: 4px 0 8px;
    font-size: 13px;
    color: #f87171;
    min-height: 18px;
    text-align: center;
    font-weight: bold;
  }

  .panel-body {
    max-height: 500px;
    overflow: hidden;
    transition: max-height 0.4s ease, opacity 0.3s ease, margin 0.4s ease;
    opacity: 1;
  }
  
  .panel-body.hidden {
    max-height: 0;
    opacity: 0;
    margin-top: 0;
  }

  .row { margin: 10px 0; }
  label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin-bottom: 4px;
    color: #9fb3d1;
  }
  input[type=range] { width: 100%; accent-color: #7ee787; }
  
  .hint {
    font-size: 11px;
    color: #6b7a96;
    margin-top: 12px;
    line-height: 1.4;
    text-align: center;
    border-top: 1px solid #2a3a5c;
    padding-top: 10px;
  }

  /* --- Retro Game Boy Controls --- */
  .gameboy-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 450px;
    margin-top: 10px;
    padding: 25px 20px;
    background: #2c2f36;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
    border: 2px solid #1f2229;
  }

  .dpad {
    position: relative;
    width: 130px;
    height: 130px;
  }
  .dpad button {
    position: absolute;
    width: 44px;
    height: 44px;
    background: #181a1f;
    border: none;
    color: #555;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    touch-action: manipulation;
    user-select: none;
    transition: background 0.05s, color 0.05s;
  }
  .dpad button:active, .dpad button.active {
    background: #3a3f4b;
    color: #aaa;
  }
  .dpad .up { top: 0; left: 43px; border-radius: 8px 8px 0 0; }
  .dpad .down { bottom: 0; left: 43px; border-radius: 0 0 8px 8px; }
  .dpad .left { left: 0; top: 43px; border-radius: 8px 0 0 8px; }
  .dpad .right { right: 0; top: 43px; border-radius: 0 8px 8px 0; }
  .dpad .center {
    position: absolute;
    top: 43px; left: 43px;
    width: 44px; height: 44px;
    background: #181a1f;
    pointer-events: none;
  }

  .ab-buttons {
    display: flex;
    gap: 15px;
    transform: rotate(-20deg);
  }
  .ab-buttons button {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: #8b1a36;
    border: 3px solid #5a1022;
    color: #fff;
    font-weight: bold;
    font-size: 18px;
    font-family: sans-serif;
    cursor: pointer;
    touch-action: manipulation;
    user-select: none;
    box-shadow: 0 5px 0 #4a0d1a, 0 8px 10px rgba(0,0,0,0.4);
    transition: transform 0.05s, box-shadow 0.05s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ab-buttons button:active {
    transform: translateY(5px);
    box-shadow: 0 0 0 #4a0d1a, 0 2px 5px rgba(0,0,0,0.4);
  }
  .ab-buttons .btn-b { margin-top: 25px; }
  
  .btn-labels {
    display: flex;
    gap: 15px;
    transform: rotate(-20deg);
    margin-top: -10px;
    margin-bottom: 10px;
  }
  .btn-labels span {
    width: 50px;
    text-align: center;
    font-size: 12px;
    color: #6b7a96;
    font-weight: bold;
  }
  .btn-labels .lbl-b { margin-top: 25px; }

  /* --- Responsive Layout --- */
  @media (max-width: 700px) {
    .top-section {
      flex-direction: column;
      align-items: center;
    }
    .panel {
      width: 100%;
      max-width: 400px;
    }
    canvas {
      max-width: 90vw;
    }
    h1 { font-size: 1.2rem; }
  }
</style>
</head>
<body>

  <h1>🐍 Snake — Retro Mobile</h1>
  
  <div class="game-area">
    <div class="top-section">
      <canvas id="game" width="500" height="500"></canvas>
      
      <div class="panel">
        <!-- Always visible header with Score and Toggle -->
        <div class="panel-header">
          <div class="score">Score: <span id="score">0</span></div>
          <button id="toggleSettings" class="toggle-btn">⚙️ Show</button>
        </div>
        
        <!-- Always visible status -->
        <div class="status" id="status"></div>

        <!-- Collapsible sliders and hints -->
        <div class="panel-body hidden" id="settingsBody">
          <div class="row">
            <label>Speed <span id="speedVal">150ms</span></label>
            <input id="speed" type="range" min="50" max="300" step="10" value="150">
          </div>
          <div class="row">
            <label>Initial Length <span id="lenVal">5</span></label>
            <input id="len" type="range" min="3" max="15" step="1" value="5">
          </div>
          <div class="row">
            <label>Food Spawn <span id="foodVal">2000ms</span></label>
            <input id="food" type="range" min="500" max="5000" step="100" value="2000">
          </div>
          <div class="hint">
            Keyboard: Arrows / WASD | P = Pause<br>
            Mobile: D-Pad below<br>
            B = Pause | A = Restart
          </div>
        </div>
      </div>
    </div>

    <!-- Retro Game Boy Controls -->
    <div class="gameboy-controls">
      <div class="dpad">
        <button class="up" data-dir="up">▲</button>
        <button class="down" data-dir="down">▼</button>
        <button class="left" data-dir="left">◀</button>
        <button class="right" data-dir="right">▶</button>
        <div class="center"></div>
      </div>
      
      <div style="display: flex; flex-direction: column; align-items: center;">
        <div class="ab-buttons">
          <button class="btn-b" id="btnPause">B</button>
          <button class="btn-a" id="btnRestart">A</button>
        </div>
        <div class="btn-labels">
          <span class="lbl-b">PAUSE</span>
          <span>RESET</span>
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const COLS = 25, ROWS = 25;
  const CELL = canvas.width / COLS;

  const speedEl = document.getElementById('speed');
  const lenEl = document.getElementById('len');
  const foodEl = document.getElementById('food');
  const speedVal = document.getElementById('speedVal');
  const lenVal = document.getElementById('lenVal');
  const foodVal = document.getElementById('foodVal');
  const scoreEl = document.getElementById('score');
  const statusEl = document.getElementById('status');
  
  const btnPause = document.getElementById('btnPause');
  const btnRestart = document.getElementById('btnRestart');
  
  const toggleBtn = document.getElementById('toggleSettings');
  const settingsBody = document.getElementById('settingsBody');

  let snake, dir, nextDir, foods, score, gameOver, isPaused;
  let moveTimer = null, foodTimer = null;

  function randCell() {
    return { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  }

  function spawnFood() {
    if (isPaused || gameOver) return;
    for (let i = 0; i < 50; i++) {
      const f = randCell();
      if (!snake.some(s => s.x === f.x && s.y === f.y) &&
          !foods.some(s => s.x === f.x && s.y === f.y)) {
        foods.push(f);
        return;
      }
    }
  }

  function init() {
    const startLen = parseInt(lenEl.value, 10);
    const startX = Math.floor(COLS / 2);
    const startY = Math.floor(ROWS / 2);
    snake = [];
    for (let i = 0; i < startLen; i++) {
      snake.push({ x: startX - i, y: startY });
    }
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    foods = [];
    score = 0;
    gameOver = false;
    isPaused = false;
    scoreEl.textContent = score;
    statusEl.textContent = '';
    spawnFood();
    restartTimers();
    draw();
  }

  function restartTimers() {
    clearInterval(moveTimer);
    clearInterval(foodTimer);
    moveTimer = setInterval(tick, parseInt(speedEl.value, 10));
    foodTimer = setInterval(spawnFood, parseInt(foodEl.value, 10));
  }

  function tick() {
    if (gameOver || isPaused) return;
    
    dir = nextDir;
    const head = snake[0];
    let nx = head.x + dir.x;
    let ny = head.y + dir.y;

    nx = (nx + COLS) % COLS;
    ny = (ny + ROWS) % ROWS;

    const newHead = { x: nx, y: ny };
    const willEat = foods.some(f => f.x === nx && f.y === ny);
    const bodyToCheck = willEat ? snake : snake.slice(0, -1);
    
    if (bodyToCheck.some(s => s.x === nx && s.y === ny)) {
      endGame();
      return;
    }

    snake.unshift(newHead);

    const eatenIdx = foods.findIndex(f => f.x === nx && f.y === ny);
    if (eatenIdx >= 0) {
      foods.splice(eatenIdx, 1);
      score += 10;
      scoreEl.textContent = score;
    } else {
      snake.pop();
    }

    draw();
  }

  function endGame() {
    gameOver = true;
    clearInterval(moveTimer);
    clearInterval(foodTimer);
    statusEl.textContent = '💀 Game Over';
    draw();
  }

  function togglePause() {
    if (gameOver) return;
    isPaused = !isPaused;
    statusEl.textContent = isPaused ? '⏸ Paused' : '';
    if (isPaused) {
      drawPauseOverlay();
    } else {
      draw();
    }
  }

  function drawPauseOverlay() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 40px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
  }

  function draw() {
    ctx.fillStyle = '#111a2e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.strokeStyle = '#1a2642';
    ctx.lineWidth = 1;
    for (let i = 1; i < COLS; i++) {
      ctx.beginPath();
      ctx.moveTo(i * CELL, 0);
      ctx.lineTo(i * CELL, canvas.height);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * CELL);
      ctx.lineTo(canvas.width, i * CELL);
      ctx.stroke();
    }

    foods.forEach(f => {
      const cx = f.x * CELL + CELL / 2;
      const cy = f.y * CELL + CELL / 2;
      ctx.fillStyle = '#f87171';
      ctx.beginPath();
      ctx.arc(cx, cy, CELL / 2 - 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fecaca';
      ctx.beginPath();
      ctx.arc(cx - 3, cy - 3, 2, 0, Math.PI * 2);
      ctx.fill();
    });

    snake.forEach((s, i) => {
      const isHead = i === 0;
      ctx.fillStyle = isHead ? '#7ee787' : '#4ade80';
      const pad = isHead ? 1 : 2;
      ctx.fillRect(s.x * CELL + pad, s.y * CELL + pad, CELL - pad * 2, CELL - pad * 2);
      if (isHead) {
        ctx.fillStyle = '#0f1724';
        const ex = s.x * CELL + CELL / 2;
        const ey = s.y * CELL + CELL / 2;
        const ox = dir.x * 3, oy = dir.y * 3;
        const px = -dir.y * 4, py = dir.x * 4;
        ctx.beginPath();
        ctx.arc(ex + ox + px, ey + oy + py, 2, 0, Math.PI * 2);
        ctx.arc(ex + ox - px, ey + oy - py, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    });

    if (isPaused) drawPauseOverlay();
  }

  // --- Settings Toggle ---
  toggleBtn.addEventListener('click', () => {
    const isHidden = settingsBody.classList.toggle('hidden');
    toggleBtn.innerHTML = isHidden ? '⚙️ Show' : '⚙️ Hide';
  });

  // --- Input Handling ---
  function changeDirection(nd) {
    if (gameOver || isPaused) return;
    if (nd.x === -dir.x && nd.y === -dir.y) return;
    nextDir = nd;
  }

  document.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    let nd = null;
    if (k === 'arrowup' || k === 'w') nd = { x: 0, y: -1 };
    else if (k === 'arrowdown' || k === 's') nd = { x: 0, y: 1 };
    else if (k === 'arrowleft' || k === 'a') nd = { x: -1, y: 0 };
    else if (k === 'arrowright' || k === 'd') nd = { x: 1, y: 0 };
    else if (k === 'p' || k === ' ') { togglePause(); return; }
    
    if (nd) {
      changeDirection(nd);
      e.preventDefault();
    }
  });

  const dpadButtons = document.querySelectorAll('.dpad button');
  dpadButtons.forEach(btn => {
    const handlePress = (e) => {
      e.preventDefault();
      const dirName = btn.dataset.dir;
      let nd = null;
      if (dirName === 'up') nd = { x: 0, y: -1 };
      else if (dirName === 'down') nd = { x: 0, y: 1 };
      else if (dirName === 'left') nd = { x: -1, y: 0 };
      else if (dirName === 'right') nd = { x: 1, y: 0 };

      if (nd) {
        changeDirection(nd);
        btn.classList.add('active');
      }
    };

    const handleRelease = (e) => {
      e.preventDefault();
      btn.classList.remove('active');
    };

    btn.addEventListener('pointerdown', handlePress);
    btn.addEventListener('pointerup', handleRelease);
    btn.addEventListener('pointerleave', handleRelease);
    btn.addEventListener('pointercancel', handleRelease);
    btn.addEventListener('contextmenu', e => e.preventDefault());
  });

  btnRestart.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    init();
  });
  
  btnPause.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    togglePause();
  });

  [btnRestart, btnPause].forEach(btn => {
    btn.addEventListener('contextmenu', e => e.preventDefault());
  });

  speedEl.addEventListener('input', () => {
    speedVal.textContent = speedEl.value + 'ms';
    if (!gameOver && !isPaused) {
      clearInterval(moveTimer);
      moveTimer = setInterval(tick, parseInt(speedEl.value, 10));
    }
  });
  lenEl.addEventListener('input', () => lenVal.textContent = lenEl.value);
  foodEl.addEventListener('input', () => {
    foodVal.textContent = foodEl.value + 'ms';
    clearInterval(foodTimer);
    foodTimer = setInterval(spawnFood, parseInt(foodEl.value, 10));
  });

  document.body.addEventListener('touchmove', (e) => {
    if (e.target.closest('.gameboy-controls') || e.target.closest('canvas')) {
      e.preventDefault();
    }
  }, { passive: false });

  init();
})();
</script>
</body>
</html>
